repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=500"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: audit-links
        name: Audit internal Markdown links
        entry: python scripts/audit_links.py
        language: system
        pass_filenames: false
        always_run: true
      - id: audit-nav-coverage
        name: Audit MkDocs nav coverage
        entry: python scripts/audit_nav_coverage.py
        language: system
        pass_filenames: false
        always_run: true
      - id: audit-math-delimiters
        name: Audit math delimiter balance
        entry: python scripts/audit_math_delimiters.py
        language: system
        pass_filenames: false
        always_run: true
