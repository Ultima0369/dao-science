name: CI Checks

on:
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'docs/javascripts/**'
      - 'scripts/**'
      - 'simulations/**'
      - 'paper/**'
  push:
    branches:
      - main
      - develop
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'docs/javascripts/**'
      - 'scripts/**'
      - 'simulations/**'
      - 'paper/**'

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync docs mirror
        run: python scripts/sync_docs.py

      - name: Build MkDocs site (strict)
        run: mkdocs build --strict

      - name: Audit internal links
        run: python scripts/audit_links.py

      - name: Audit math delimiter balance
        run: python scripts/audit_math_delimiters.py

      - name: Audit nav coverage
        run: python scripts/audit_nav_coverage.py

      - name: Install simulation dependencies
        run: pip install -r simulations/requirements.txt

      - name: Run all simulations
        run: |
          set -e
          for script in simulations/*.py; do
            echo "Running $script"
            python "$script"
          done

  latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-lang-chinese texlive-fonts-recommended texlive-latex-extra

      - name: Compile English preprints (pdflatex)
        run: |
          for d in paper/preprint_1 paper/preprint_2 paper/preprint_3; do
            if [ -f "$d/main.tex" ]; then
              echo "Compiling $d/main.tex with pdflatex"
              (cd "$d" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
              (cd "$d" && pdflatex -interaction=nonstopmode -halt-on-error main.tex)
            fi
          done

      - name: Compile Chinese preprints (xelatex)
        run: |
          for d in paper/preprint_4 paper/preprint_5 paper/preprint_6 paper/preprint_7 paper/preprint_8; do
            if [ -f "$d/main.tex" ]; then
              echo "Compiling $d/main.tex with xelatex"
              (cd "$d" && xelatex -interaction=nonstopmode -halt-on-error main.tex)
              (cd "$d" && xelatex -interaction=nonstopmode -halt-on-error main.tex)
            fi
          done

      - name: Upload PDF artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: preprint-pdfs
          path: paper/preprint_*/main.pdf
          if-no-files-found: ignore
