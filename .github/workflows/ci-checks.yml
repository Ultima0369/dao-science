name: CI Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'docs/javascripts/**'
  push:
    branches:
      - main
    paths:
      - '**.md'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - '.github/workflows/**'
      - 'docs/javascripts/**'

jobs:
  mkdocs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sync docs mirror
        run: python scripts/sync_docs.py

      - name: Build MkDocs site (strict)
        run: mkdocs build --strict

  latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-xetex texlive-lang-chinese texlive-fonts-recommended texlive-latex-extra

      - name: Compile English preprints (pdflatex)
        run: |
          for d in paper/preprint_1 paper/preprint_2 paper/preprint_3; do
            if [ -f "$d/main.tex" ]; then
              echo "Compiling $d/main.tex with pdflatex"
              (cd "$d" && pdflatex -interaction=nonstopmode -halt-on-error main.tex || true)
              (cd "$d" && pdflatex -interaction=nonstopmode -halt-on-error main.tex || true)
            fi
          done

      - name: Compile Chinese preprints (xelatex)
        run: |
          for d in paper/preprint_4 paper/preprint_5 paper/preprint_6 paper/preprint_7 paper/preprint_8; do
            if [ -f "$d/main.tex" ]; then
              echo "Compiling $d/main.tex with xelatex"
              (cd "$d" && xelatex -interaction=nonstopmode -halt-on-error main.tex || true)
              (cd "$d" && xelatex -interaction=nonstopmode -halt-on-error main.tex || true)
            fi
          done
